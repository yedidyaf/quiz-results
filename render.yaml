services:
  - type: web
    name: quiz-results
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: quiz-db
          property: connectionString

databases:
  - name: quiz-db
    plan: free
